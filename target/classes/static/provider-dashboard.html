<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Provider Dashboard - ServiceHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/psdashboard.css">

   
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">🛠 ServiceHub - Provider</span>
        <div>
            <span class="text-white me-3" id="providerName"></span>
            <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h3>Welcome, <span id="welcomeName"></span> 👋</h3>

  <div class="card p-4 mt-4">
    <h4>Available Service Requests</h4>

    <div class="table-responsive">
        <table class="table table-bordered table-hover mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Category</th>
                    <th>Description</th>
                    <th>Address</th>
                    <th>Customer Name</th>
                    <th>Phone</th>
                    <th>Image</th>
                    <th>Action</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="requestTable">
                <tr>
                    <td colspan="9" class="text-center">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
    

<!-- ================= IMAGE MODAL ================= -->
<div class="modal fade" id="imageModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content bg-dark">
      <div class="modal-header border-0">
        <h5 class="modal-title text-white">Image Preview</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <img id="modalImage" src="" class="img-fluid rounded">
      </div>
    </div>
  </div>
</div>

<!-- ================= QUOTATION MODAL ================= -->
<div class="modal fade" id="quotationModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Give Quotation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">

        <input type="hidden" id="requestId">

        <div class="mb-3">
          <label class="form-label">Amount (₹)</label>
          <input type="number" id="amount" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Message</label>
          <textarea id="message" class="form-control" required></textarea>
        </div>

        <button class="btn btn-success w-100" onclick="submitQuotation()">
            Submit Quotation
        </button>

      </div>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ================= SESSION DISPLAY =================
const providerName = sessionStorage.getItem("userName");
const providerCategory = sessionStorage.getItem("providerCategory");

document.getElementById("providerName").innerText = providerName || "";
document.getElementById("welcomeName").innerText = providerName || "";

if (!providerCategory) {
    alert("Please login again");
    window.location.href = "provider-login.html";
}

// ================= LOAD REQUESTS =================
async function loadRequests(){

    const response = await fetch(
        `http://localhost:8080/api/service-requests/category/${providerCategory}`,
        { credentials:"include" }
    );

    const data = await response.json();
    const table = document.getElementById("requestTable");
    table.innerHTML = "";

    if(data.length === 0){
        table.innerHTML = `
            <tr>
                <td colspan="9" class="text-center">
                    No requests available
                </td>
            </tr>`;
        return;
    }

    for(const req of data){

        // 🔥 Get quotations for this request
        const qRes = await fetch(
            `http://localhost:8080/api/quotations/request/${req.id}`,
            { credentials:"include" }
        );

        const quotations = await qRes.json();

        // 🔥 Check if this provider already quoted
        const alreadyQuoted = quotations.find(q =>
            q.providerName === providerName
        );

        let actionButton = "";

        if(req.status === "Confirmed"){
            actionButton = `
                <button class="btn btn-secondary btn-sm" disabled>
                    Closed
                </button>`;
        }
        else if(alreadyQuoted){
            actionButton = `
                <button class="btn btn-warning btn-sm" disabled>
                    Already Given
                </button>`;
        }
        else{
            actionButton = `
                <button class="btn btn-primary btn-sm"
                    onclick="openQuotationModal(${req.id})">
                    Give Quotation
                </button>`;
        }

        table.innerHTML += `
            <tr>
                <td>${req.id}</td>
                <td>${req.category}</td>
                <td>${req.description}</td>
                <td>
    ${req.address}
    
</td>
                <td>${req.customerName || '-'}</td>
                <td>${req.customerPhone || '-'}</td>
                <td>
                    ${req.imagePath 
                        ? `<img src="http://localhost:8080/uploads/${req.imagePath}" 
                               class="img-thumb"
                               onclick="openImageModal('http://localhost:8080/uploads/${req.imagePath}')">`
                        : 'No Image'}
                </td>
                <td>
                    <span class="badge bg-${
                        req.status === 'Confirmed' ? 'success' : 'warning'
                    }">
                        ${req.status}
                    </span>
                </td>
                <td>${actionButton}</td>
            </tr>`;
    }
}

loadRequests();

// ================= IMAGE MODAL =================
function openImageModal(url){
    document.getElementById("modalImage").src = url;
    new bootstrap.Modal(document.getElementById("imageModal")).show();
}

// ================= OPEN QUOTATION MODAL =================
function openQuotationModal(id){
    document.getElementById("requestId").value = id;
    document.getElementById("amount").value = "";
    document.getElementById("message").value = "";

    new bootstrap.Modal(
        document.getElementById("quotationModal")
    ).show();
}

// ================= SUBMIT QUOTATION =================
async function submitQuotation(){

    const requestId = document.getElementById("requestId").value;
    const amount = document.getElementById("amount").value;
    const message = document.getElementById("message").value;

    if(!amount || !message){
        alert("Please fill all fields");
        return;
    }

    const response = await fetch(
        "http://localhost:8080/api/quotations/add",
        {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            credentials:"include",
            body: JSON.stringify({
                serviceRequestId: requestId,
                amount: amount,
                message: message
            })
        }
    );

    const data = await response.json();

    if(response.ok){
        alert("Quotation Submitted Successfully!");
        bootstrap.Modal.getInstance(
            document.getElementById("quotationModal")
        ).hide();
        loadRequests();   // 🔥 Refresh table
    }
    else{
        alert(data.message);
    }
}

// ================= LOGOUT =================
async function logout(){
    await fetch("http://localhost:8080/api/auth/logout",
        { method:"POST", credentials:"include" });

    sessionStorage.clear();
    window.location.href="provider-login.html";
}
async function checkNotifications(){

    const res = await fetch(
        "http://localhost:8080/api/quotations/provider/notifications",
        { credentials:"include" }
    );

    const data = await res.json();

    if(data.length > 0){

        data.forEach(q => {
            alert(
                "🎉 Good News!\n\n" +
                "Customer accepted your quotation!\n\n" +
                "Amount: ₹" + q.amount
            );
        });
    }
}

checkNotifications();
</script>

</body>
</html>
