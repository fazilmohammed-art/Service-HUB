<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Provider Login - ServiceHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/pslogin.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">🔧 ServiceHub</a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center gap-3">

                <li class="nav-item">
                    <a class="nav-link nav-home" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-customer-login"
                       href="customer-login.html">
                       👤 Customer Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-provider-login active-login"
                       href="provider-login.html">
                       🛠 Provider Login
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- ================= LOGIN WRAPPER ================= -->
<div class="auth-wrapper">

    <div class="auth-card">

        <h3 class="text-center mb-3">🛠 Provider Login</h3>

        <div id="alertMessage"></div>

        <!-- STEP 1 LOGIN FORM -->
        <form id="loginForm">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-login">
                Send OTP
            </button>

        </form>

        <!-- STEP 2 OTP FORM (Hidden initially) -->
        <form id="otpForm" style="display:none;">

            <div class="mb-3 mt-3">
                <label class="form-label">Enter OTP</label>
                <input type="text" id="otp" class="form-control" required>
            </div>

            <button type="submit" class="btn-login">
                Verify OTP
            </button>

        </form>

        <hr>

        <div class="text-center">
            Don't have an account?
            <a href="provider-register.html">
                Register here
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

// ================= STEP 1: LOGIN & SEND OTP =================
document.getElementById("loginForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const alertDiv = document.getElementById("alertMessage");

    try {

        const response = await fetch(
            "http://localhost:8080/api/auth/provider/login",
            {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body: JSON.stringify({ email, password })
            }
        );

        const data = await response.json();

        if(response.ok){

            alertDiv.innerHTML =
                `<div class="alert alert-success">
                    OTP sent to your email.
                 </div>`;

            // Hide login form
            document.getElementById("loginForm").style.display = "none";

            // Show OTP form
            document.getElementById("otpForm").style.display = "block";

        } else {
            alertDiv.innerHTML =
                `<div class="alert alert-danger">
                    ${data.message}
                 </div>`;
        }

    } catch (error) {

        alertDiv.innerHTML =
            `<div class="alert alert-danger">
                Server not reachable
             </div>`;
    }

});


// ================= STEP 2: VERIFY OTP =================
document.getElementById("otpForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;
    const otp = document.getElementById("otp").value;
    const alertDiv = document.getElementById("alertMessage");

    try {

        const response = await fetch(
            "http://localhost:8080/api/auth/provider/verify-otp",
            {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                credentials:"include",
                body: JSON.stringify({ email, otp })
            }
        );

        const data = await response.json();

        if(response.ok){

            sessionStorage.setItem("providerCategory", data.category);
            sessionStorage.setItem("userName", data.name);

            alertDiv.innerHTML =
                `<div class="alert alert-success">
                    Login successful!
                 </div>`;

            setTimeout(() => {
                window.location.href = "provider-dashboard.html";
            }, 800);

        } else {

            alertDiv.innerHTML =
                `<div class="alert alert-danger">
                    ${data.message}
                 </div>`;
        }

    } catch (error) {

        alertDiv.innerHTML =
            `<div class="alert alert-danger">
                Server error
             </div>`;
    }

});

</script>

</body>
</html>
