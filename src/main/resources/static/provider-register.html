<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Provider Registration - ServiceHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/psregister.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">🔧 ServiceHub</a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-center gap-3">

                <li class="nav-item">
                    <a class="nav-link nav-home" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-customer-login"
                       href="customer-login.html">
                       👤 Customer Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-provider-login active-login"
                       href="provider-login.html">
                       🛠 Provider Login
                    </a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- ================= REGISTER WRAPPER ================= -->
<div class="auth-wrapper">

    <div class="auth-card">

        <h3 class="text-center mb-3">🛠 Provider Registration</h3>

        <div id="alertMessage"></div>

        <form id="providerRegisterForm">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

           <div class="mb-3">
    <label class="form-label">Phone</label>
    <input 
        type="tel"
        id="phone"
        class="form-control"
        maxlength="10"
        pattern="[0-9]{10}"
        oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);"
        required
    >
</div>

            <div class="mb-3">
                <label class="form-label">Service Category</label>
                <select id="category" class="form-control" required>
                    <option value="">Select Category</option>
                    <option>Plumbing</option>
                    <option>Electrical</option>
                    <option>Carpentry</option>
                    <option>Cleaning</option>
                    <option>AC Repair</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-register">
                Register
            </button>

        </form>

        <hr>

        <div class="text-center">
            Already have an account?
            <a href="provider-login.html">
                Login here
            </a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('providerRegisterForm').addEventListener('submit', async function(e) {

    e.preventDefault();

    const alertDiv = document.getElementById('alertMessage');

    const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        category: document.getElementById('category').value,
        password: document.getElementById('password').value
    };

    try {

        const response = await fetch(
            'http://localhost:8080/api/auth/provider/register',
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            }
        );

        const data = await response.json();

        if (response.ok) {

            alertDiv.innerHTML =
                `<div class="alert alert-success">${data.message}</div>`;

            setTimeout(() => {
                window.location.href = "provider-login.html";
            }, 1200);

        } else {

            alertDiv.innerHTML =
                `<div class="alert alert-danger">${data.message}</div>`;
        }

    } catch (error) {

        alertDiv.innerHTML =
            `<div class="alert alert-danger">Server not reachable</div>`;
    }
});
</script>

</body>
</html>
