<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Service Request - ServiceHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/servicerequest.css">


</head>

<body>

<div class="card-box">

    <h3 class="mb-4 text-center">Create Service Request</h3>

    <div id="alertMessage"></div>

    <form id="requestForm" enctype="multipart/form-data">

        <!-- CATEGORY DROPDOWN -->
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="category" class="form-select" required>
                <option value="">Select Category</option>
                <option value="Plumbing">Plumbing</option>
                <option value="Electrical">Electrical</option>
                <option value="Cleaning">Cleaning</option>
                <option value="Carpentry">Carpentry</option>
                <option value="AC Repair">AC Repair</option>
            </select>
        </div>

        <!-- DESCRIPTION -->
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="description" class="form-control" rows="3" required></textarea>
        </div>

        <!-- ADDRESS -->
        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" id="address" class="form-control" required>
        </div>
        <div class="mb-3">
    <label class="form-label">Google Maps Location Link (Optional)</label>
    <input type="text"
           id="location"
           class="form-control"
           placeholder="Paste Google Maps link here">
</div>

        <!-- IMAGE -->
        <div class="mb-3">
            <label class="form-label">Upload Image</label>
            <input type="file" id="image" class="form-control" accept="image/*" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit</button>

    </form>

</div>

<script>

document.getElementById("requestForm").addEventListener("submit", async function(e) {

    e.preventDefault();

    const alertDiv = document.getElementById("alertMessage");

    const category = document.getElementById("category").value;
    const description = document.getElementById("description").value;
    const address = document.getElementById("address").value;
    const imageFile = document.getElementById("image").files[0];

    // Simple Validation
    if (!category) {
        alertDiv.innerHTML = `<div class="alert alert-danger">Please select category</div>`;
        return;
    }

    const formData = new FormData();
    formData.append("category", category);
    formData.append("description", description);
    formData.append("address", address);
    formData.append("image", imageFile);

    try {

        const response = await fetch(
            "http://localhost:8080/api/service-requests/create",
            {
                method: "POST",
                credentials: "include",
                body: formData
            }
        );

        const data = await response.json();

        if (response.ok) {

            alertDiv.innerHTML =
                `<div class="alert alert-success">${data.message}</div>`;

            // Redirect after 1 second
            setTimeout(() => {
                 "customer-dashboard.html";
            }, 1000);

        } else {

            alertDiv.innerHTML =
                `<div class="alert alert-danger">${data.message}</div>`;
        }

    } catch (error) {

        alertDiv.innerHTML =
            `<div class="alert alert-danger">Server Error</div>`;

        console.error(error);
    }

});

</script>

</body>
</html>
