<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Login - ServiceHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="css/cslogin.css">
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg custom-navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html">🔧 ServiceHub</a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center gap-3">

                <li class="nav-item">
                    <a class="nav-link nav-home" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-customer-login active-login"
                       href="customer-login.html">
                       👤 Customer Login
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-provider-login"
                       href="provider-login.html">
                       🔧 Provider Login
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- ================= LOGIN WRAPPER ================= -->
<div class="auth-wrapper">

    <div class="auth-card">

        <h2>👤 Customer Login</h2>

        <div id="alertMessage"></div>

        <form id="customerLoginForm">

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-login">Login</button>

        </form>

        <div class="text-center mt-3">
            Don't have an account?
            <a href="customer-register.html">Register here</a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById('customerLoginForm').addEventListener('submit', async function(e) {

    e.preventDefault();

    const alertDiv = document.getElementById('alertMessage');

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {

        const response = await fetch('http://localhost:8080/api/auth/customer/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {

            alertDiv.innerHTML =
                `<div class="alert alert-success">${data.message}</div>`;

            setTimeout(() => {
                window.location.href = "customer-dashboard.html";
            }, 1000);

        } else {

            alertDiv.innerHTML =
                `<div class="alert alert-danger">${data.message}</div>`;
        }

    } catch (error) {

        alertDiv.innerHTML =
            `<div class="alert alert-danger">Server not reachable</div>`;

        console.error(error);
    }
});
</script>

</body>
</html>
